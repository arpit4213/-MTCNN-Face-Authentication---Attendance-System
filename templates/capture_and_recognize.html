<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Mark Attendance - Face Recognition</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }
        
        body {
            font-family: 'Arial', sans-serif;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            min-height: 100vh;
            display: flex;
            justify-content: center;
            align-items: center;
            padding: 20px;
        }
        
        .container {
            background: white;
            border-radius: 15px;
            box-shadow: 0 10px 40px rgba(0, 0, 0, 0.3);
            padding: 30px;
            max-width: 800px;
            width: 100%;
        }
        
        h1 {
            text-align: center;
            color: #333;
            margin-bottom: 30px;
            font-size: 2em;
        }
        
        .camera-section {
            text-align: center;
            margin-bottom: 20px;
        }
        
        #video {
            width: 100%;
            max-width: 500px;
            height: auto;
            border-radius: 10px;
            background: #000;
            border: 3px solid #667eea;
            margin: 20px 0;
        }
        
        #canvas {
            display: none;
        }
        
        .controls {
            display: flex;
            gap: 10px;
            justify-content: center;
            margin: 20px 0;
            flex-wrap: wrap;
        }
        
        button {
            padding: 12px 25px;
            font-size: 16px;
            border: none;
            border-radius: 8px;
            cursor: pointer;
            transition: all 0.3s ease;
            font-weight: bold;
            text-transform: uppercase;
        }
        
        #startBtn {
            background-color: #667eea;
            color: white;
        }
        
        #startBtn:hover {
            background-color: #5568d3;
            transform: translateY(-2px);
        }
        
        #stopBtn {
            background-color: #e74c3c;
            color: white;
        }
        
        #stopBtn:hover {
            background-color: #c0392b;
            transform: translateY(-2px);
        }
        
        #stopBtn:disabled {
            background-color: #bdc3c7;
            cursor: not-allowed;
        }
        
        .status {
            padding: 15px;
            margin: 15px 0;
            border-radius: 8px;
            text-align: center;
            font-weight: bold;
            display: none;
        }
        
        .status.success {
            background-color: #d4edda;
            color: #155724;
            border: 1px solid #c3e6cb;
            display: block;
        }
        
        .status.error {
            background-color: #f8d7da;
            color: #721c24;
            border: 1px solid #f5c6cb;
            display: block;
        }
        
        .status.info {
            background-color: #d1ecf1;
            color: #0c5460;
            border: 1px solid #bee5eb;
            display: block;
        }
        
        .results {
            margin-top: 20px;
            max-height: 300px;
            overflow-y: auto;
        }
        
        .result-item {
            background: #f8f9fa;
            padding: 15px;
            margin: 10px 0;
            border-radius: 8px;
            border-left: 4px solid #667eea;
            animation: slideIn 0.3s ease;
        }
        
        .result-item.checked-in {
            border-left-color: #28a745;
        }
        
        .result-item.checked-out {
            border-left-color: #ffc107;
        }
        
        .result-item.error {
            border-left-color: #e74c3c;
        }
        
        @keyframes slideIn {
            from {
                opacity: 0;
                transform: translateX(-20px);
            }
            to {
                opacity: 1;
                transform: translateX(0);
            }
        }
        
        .result-name {
            font-weight: bold;
            font-size: 1.1em;
            color: #333;
        }
        
        .result-message {
            color: #666;
            margin-top: 5px;
            font-size: 0.95em;
        }
        
        .back-link {
            display: block;
            text-align: center;
            margin-top: 20px;
        }
        
        .back-link a {
            color: #667eea;
            text-decoration: none;
            font-weight: bold;
            transition: color 0.3s ease;
        }
        
        .back-link a:hover {
            color: #764ba2;
        }
        
        .loading {
            display: none;
            text-align: center;
            padding: 20px;
        }
        
        .spinner {
            border: 4px solid #f3f3f3;
            border-top: 4px solid #667eea;
            border-radius: 50%;
            width: 40px;
            height: 40px;
            animation: spin 1s linear infinite;
            margin: 0 auto;
        }
        
        @keyframes spin {
            0% { transform: rotate(0deg); }
            100% { transform: rotate(360deg); }
        }
        
        .frame-info {
            color: #999;
            font-size: 0.9em;
            margin-top: 10px;
        }
        
        @media (max-width: 600px) {
            .container {
                padding: 20px;
            }
            
            h1 {
                font-size: 1.5em;
            }
            
            button {
                padding: 10px 15px;
                font-size: 14px;
            }
        }
    </style>
</head>
<body>
    <div class="container">
        <h1>Mark Attendance</h1>
        <p style="text-align: center; color: #666; margin-bottom: 20px;">Face Recognition Attendance System</p>
        
        <div class="camera-section">
            <video id="video" playsinline autoplay muted></video>
            <canvas id="canvas"></canvas>
            
            <div class="controls">
                <button id="startBtn">Start Camera</button>
                <button id="stopBtn" disabled>Stop Camera</button>
            </div>
            
            <div class="frame-info">
                <span id="frameCount">Frames processed: 0</span> | 
                <span id="recognitionStatus">Waiting to start...</span>
            </div>
        </div>
        
        <div id="statusMessage" class="status"></div>
        <div class="loading" id="loading">
            <div class="spinner"></div>
            <p>Processing frame...</p>
        </div>
        
        <div class="results" id="results"></div>
        
        <div class="back-link">
            <a href="{% url 'home' %}">← Back to Home</a>
        </div>
    </div>

    <script>
        const video = document.getElementById('video');
        const canvas = document.getElementById('canvas');
        const ctx = canvas.getContext('2d');
        const startBtn = document.getElementById('startBtn');
        const stopBtn = document.getElementById('stopBtn');
        const statusMessage = document.getElementById('statusMessage');
        const resultsDiv = document.getElementById('results');
        const loading = document.getElementById('loading');
        const frameCount = document.getElementById('frameCount');
        const recognitionStatus = document.getElementById('recognitionStatus');
        
        let stream = null;
        let isRunning = false;
        let isProcessing = false;  // Flag to prevent multiple simultaneous requests
        let hasRecognized = false;  // Flag to stop processing after successful recognition
        let frameCounter = 0;
        let lastRecognitionTime = 0;
        const RECOGNITION_INTERVAL = 500; // Process frame every 500ms to avoid overwhelming the server
        
        // Request camera access
        startBtn.addEventListener('click', async () => {
            try {
                startBtn.disabled = true;
                recognitionStatus.textContent = 'Requesting camera access...';
                
                stream = await navigator.mediaDevices.getUserMedia({
                    video: {
                        width: { ideal: 640 },
                        height: { ideal: 480 }
                    },
                    audio: false
                });
                
                video.srcObject = stream;
                video.onloadedmetadata = () => {
                    video.play();
                    isRunning = true;
                    stopBtn.disabled = false;
                    recognitionStatus.textContent = 'Camera active - detecting faces...';
                    canvas.width = video.videoWidth;
                    canvas.height = video.videoHeight;
                    
                    showStatus('Camera started successfully!', 'info');
                    
                    // Start processing frames
                    processFrames();
                };
            } catch (error) {
                startBtn.disabled = false;
                showStatus('Error accessing camera: ' + error.message, 'error');
                recognitionStatus.textContent = 'Camera access denied';
            }
        });
        
        // Stop camera
        stopBtn.addEventListener('click', () => {
            stopCamera();
        });
        
        function stopCamera() {
            isRunning = false;
            hasRecognized = false;  // Reset for potential restart
            if (stream) {
                stream.getTracks().forEach(track => track.stop());
            }
            video.srcObject = null;
            startBtn.disabled = false;
            stopBtn.disabled = true;
            recognitionStatus.textContent = 'Camera stopped';
            showStatus('Camera stopped', 'info');
        }
        
        async function processFrames() {
            if (!isRunning || hasRecognized) return;
            
            const currentTime = Date.now();
            if (currentTime - lastRecognitionTime > RECOGNITION_INTERVAL && !isProcessing) {
                frameCounter++;
                frameCount.textContent = `Frames processed: ${frameCounter}`;
                
                // Capture frame
                ctx.drawImage(video, 0, 0, canvas.width, canvas.height);
                const imageData = canvas.toDataURL('image/jpeg', 0.7);
                
                // Send to server
                try {
                    isProcessing = true;  // Prevent multiple simultaneous requests
                    loading.style.display = 'block';
                    const response = await fetch('{% url "process_frame_api" %}', {
                        method: 'POST',
                        headers: {
                            'Content-Type': 'application/json',
                            'X-CSRFToken': getCookie('csrftoken')
                        },
                        body: JSON.stringify({
                            image_data: imageData
                        })
                    });
                    
                    loading.style.display = 'none';
                    isProcessing = false;
                    
                    if (response.ok) {
                        const data = await response.json();
                        if (data.success && data.results.length > 0) {
                            data.results.forEach(result => {
                                addResultItem(result);
                            });
                            
                            // Stop camera if should_stop flag is true
                            if (data.should_stop) {
                                hasRecognized = true;  // Prevent further frame processing
                                setTimeout(() => {
                                    stopCamera();
                                }, 1000); // Delay to show the message
                            }
                        }
                    } else {
                        const error = await response.json();
                        console.error('API Error:', error);
                        isProcessing = false;
                    }
                } catch (error) {
                    loading.style.display = 'none';
                    isProcessing = false;
                    console.error('Error sending frame:', error);
                }
                
                lastRecognitionTime = currentTime;
            }
            
            if (isRunning) {
                requestAnimationFrame(processFrames);
            }
        }
        
        function addResultItem(result) {
            const resultItem = document.createElement('div');
            resultItem.className = 'result-item';
            
            if (result.status === 'checked_in' || result.status === 'checked_out') {
                resultItem.classList.add('checked-in');
            } else {
                resultItem.classList.add('error');
            }
            
            resultItem.innerHTML = `
                <div class="result-name">${result.name}</div>
                <div class="result-message">${result.message}</div>
                <div class="result-message" style="font-size: 0.85em; color: #999;">
                    ${new Date().toLocaleTimeString()}
                </div>
            `;
            
            resultsDiv.insertBefore(resultItem, resultsDiv.firstChild);
            
            // Keep only last 10 results
            while (resultsDiv.children.length > 10) {
                resultsDiv.removeChild(resultsDiv.lastChild);
            }
        }
        
        function showStatus(message, type) {
            statusMessage.textContent = message;
            statusMessage.className = `status ${type}`;
            
            if (type !== 'error') {
                setTimeout(() => {
                    statusMessage.className = 'status';
                }, 3000);
            }
        }
        
        function getCookie(name) {
            let cookieValue = null;
            if (document.cookie && document.cookie !== '') {
                const cookies = document.cookie.split(';');
                for (let i = 0; i < cookies.length; i++) {
                    const cookie = cookies[i].trim();
                    if (cookie.substring(0, name.length + 1) === (name + '=')) {
                        cookieValue = decodeURIComponent(cookie.substring(name.length + 1));
                        break;
                    }
                }
            }
            return cookieValue;
        }
        
        // Clean up on page unload
        window.addEventListener('beforeunload', () => {
            if (isRunning) {
                stopCamera();
            }
        });
    </script>
</body>
</html>
